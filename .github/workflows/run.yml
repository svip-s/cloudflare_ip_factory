name: Global IP Factory

on:
  schedule:
    - cron: '11 5 * * *' # 每天北京时间 11:11 自动运行
  workflow_dispatch: # 支持手动点击运行

# 全局环境变量：强制指定 Node 24 运行环境，压制大部分弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        # 使用精准小版本号，避开 Node 20 关联警告
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        # 使用精准小版本号，适配最新的 Node 运行环境
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests boto3

      - name: Run Factory
        # 核心：必须映射 Secrets 变量，机器人才能在代码里拿到 Token 和 ID
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python collect.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 防止由于远程仓库有变动导致的推送失败
          git pull origin main --rebase || echo "不需要拉取"
          
          git add ips.txt
          
          # 检查是否有内容变更，避免空提交
          if git diff --staged --quiet; then
            echo "今日份 IP 数据无变化，无需更新。"
          else
            git commit -m "🚀 自动更新：捕获最新 IP ($(date +'%Y-%m-%d %H:%M'))"
            git push
          fi

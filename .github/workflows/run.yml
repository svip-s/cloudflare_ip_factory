name: Global IP Factory

on:
  schedule:
    - cron: '11 3 * * *' # 每天北京时间 11:11 运行
  workflow_dispatch: # 支持手动点击运行

# 关键：在全局设置 Node 强制变量，彻底堵住那个黄色警告的嘴
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 显式使用最新的 v4 逻辑
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          # 这里也是避坑点，不指定缓存可以减少没必要的警告

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Factory
        # 核心：必须在这里把后台的 Secrets 映射给代码的环境变量
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python collect.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 先拉取最新的远程改动，防止因为同步问题导致 Push 失败
          git pull origin main || echo "无需拉取"
          
          git add ips.txt
          
          # 检查是否有内容变更
          if git diff --staged --quiet; then
            echo "今日份 IP 已是最新，无需更新。"
          else
            git commit -m "🚀 自动更新：捕获最新 IP ($(date +'%Y-%m-%d %H:%M'))"
            git push
          fi

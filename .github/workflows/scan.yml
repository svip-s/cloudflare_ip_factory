name: CF IP Factory

on:
  schedule:
    - cron: '0 */2 * * *'  # 每 2 小时自动开工一次
  workflow_dispatch:      # 允许你手动点按钮立刻开工

jobs:
  run-factory:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 运行生产线
        run: python generate_source.py

      - name: 将生肉存入仓库
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Cloudflare-Bot"
          git add all.txt
          git commit -m "Update fresh IP sources" || exit 0
          git push
